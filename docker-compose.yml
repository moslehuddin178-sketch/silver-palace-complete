services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: silver_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-silverpalace2024}
      MONGO_INITDB_DATABASE: silver_jewelry
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      - silver_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: silver_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb+srv://moslehuddin178_db_user:D7zYfjA1Enf9RqdM@cluster1.vrbqgoa.mongodb.net/silver_jewelry?appName=Cluster1
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please_use_long_random_string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SHOP_NAME: ${SHOP_NAME:-Silver Palace Jewelry}
      SHOP_CURRENCY: ${SHOP_CURRENCY:-USD}
      SHOP_TAX_RATE: ${SHOP_TAX_RATE:-0.08}
      SILVER_GRAM_PRICE: ${SILVER_GRAM_PRICE:-0.85}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-your@gmail.com}
      EMAIL_PASS: ${EMAIL_PASS:-your_gmail_app_password}
      EMAIL_FROM: ${EMAIL_FROM:-Silver Palace <your@gmail.com>}
      ME_USER: ${ME_USER:-dbadmin}
      ME_PASS: ${ME_PASS:-dbpass123}S

    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - silver_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=false"

  # ── Frontend (React + Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: silver_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - silver_net
    ports:
      - "${APP_PORT:-80}:80"
    labels:
      - "traefik.enable=false"

  # ── Mongo Express (DB Admin UI) ───────────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: silver_db_admin
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASS:-silverpalace2024}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_USER:-dbadmin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_PASS:-dbpass123}
    ports:
      - "8081:8081"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - silver_net
    profiles:
      - tools

networks:
  silver_net:
    driver: bridge

volumes:
  mongo_data:
    driver: local
